<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 600" font-family="-apple-system,Segoe UI,PingFang SC,Microsoft YaHei,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b98a9"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="780" height="600" fill="#0b0e14"/>
  <text x="390" y="32" text-anchor="middle" fill="#e6edf3" font-size="19" font-weight="700">ib_quant 系统架构与数据流</text>

  <rect x="290" y="48" width="200" height="58" rx="8" fill="#141a24" stroke="#263041"/>
  <text x="390" y="74" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">① IB 子账户<tspan x="390" dy="18" fill="#8b98a9" font-size="11" font-weight="400">正股/期权权限 + 市场数据</tspan></text>

  <rect x="290" y="126" width="200" height="58" rx="8" fill="#16314f" stroke="#388bfd"/>
  <text x="390" y="152" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">② IB Gateway<tspan x="390" dy="18" fill="#9cc4f5" font-size="11" font-weight="400">登录 + 2FA · API 4001/4002</tspan></text>

  <rect x="290" y="210" width="200" height="58" rx="8" fill="#141a24" stroke="#263041"/>
  <text x="390" y="236" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">③ 调度器 · 周期轮询<tspan x="390" dy="18" fill="#8b98a9" font-size="11" font-weight="400">每 N 秒拉账户/持仓/行情</tspan></text>

  <rect x="290" y="294" width="200" height="58" rx="8" fill="#141a24" stroke="#263041"/>
  <text x="390" y="328" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">④ 策略引擎 · 算买卖信号</text>

  <rect x="290" y="378" width="200" height="58" rx="8" fill="#2a2410" stroke="#5c4d1f"/>
  <text x="390" y="404" text-anchor="middle" fill="#f0d98c" font-size="13" font-weight="700">⑤ 安全护栏<tspan x="390" dy="18" fill="#cbb86f" font-size="11" font-weight="400">DRY_RUN/白名单/金额/笔数</tspan></text>

  <rect x="290" y="462" width="200" height="58" rx="8" fill="#141a24" stroke="#263041"/>
  <text x="390" y="496" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">⑥ 下单 · 模拟盘 / 实盘</text>

  <line x1="390" y1="106" x2="390" y2="124" stroke="#8b98a9" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="390" y1="184" x2="390" y2="208" stroke="#8b98a9" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="390" y1="268" x2="390" y2="292" stroke="#8b98a9" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="390" y1="352" x2="390" y2="376" stroke="#8b98a9" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="390" y1="436" x2="390" y2="460" stroke="#8b98a9" stroke-width="1.6" marker-end="url(#arr)"/>

  <text x="282" y="198" text-anchor="end" fill="#8b98a9" font-size="11">Socket API</text>
  <text x="282" y="212" text-anchor="end" fill="#5f6b7a" font-size="10">查价/下单/账户/行情</text>

  <rect x="35" y="292" width="200" height="60" rx="8" fill="#16314f" stroke="#388bfd"/>
  <text x="135" y="318" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">Web 看板 (FastAPI)<tspan x="135" dy="18" fill="#9cc4f5" font-size="11" font-weight="400">http://主机:8800</tspan></text>
  <line x1="290" y1="316" x2="237" y2="316" stroke="#8b98a9" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="263" y="306" text-anchor="middle" fill="#5f6b7a" font-size="10">/api</text>
  <line x1="170" y1="352" x2="300" y2="528" stroke="#8b98a9" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="205" y="455" fill="#5f6b7a" font-size="10">浏览器看盘</text>

  <rect x="545" y="210" width="200" height="52" rx="8" fill="#141a24" stroke="#263041"/>
  <text x="645" y="241" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">⑦ hooks 事件总线</text>

  <rect x="545" y="292" width="200" height="52" rx="8" fill="#102a16" stroke="#1f4f2a"/>
  <text x="645" y="313" text-anchor="middle" fill="#9be3ae" font-size="13" font-weight="700">notifier<tspan x="645" dy="17" fill="#6fc888" font-size="11" font-weight="400">Telegram + 邮箱</tspan></text>

  <path d="M490,323 C520,300 525,270 543,250" fill="none" stroke="#8b98a9" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="512" y="288" fill="#5f6b7a" font-size="10">emit 事件</text>

  <line x1="645" y1="262" x2="645" y2="290" stroke="#8b98a9" stroke-width="1.6" marker-end="url(#arr)"/>

  <rect x="290" y="520" width="200" height="56" rx="8" fill="#141a24" stroke="#388bfd"/>
  <text x="390" y="545" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="700">你<tspan x="390" dy="17" fill="#8b98a9" font-size="11" font-weight="400">收到推送 · 实时看盘</tspan></text>

  <path d="M645,344 L645,548 L492,548" fill="none" stroke="#8b98a9" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="655" y="445" fill="#5f6b7a" font-size="10">推送通知</text>
</svg>
