<h2>二、核心框架：Fama-French 五因子模型</h2>

<p>这是现代金融学最重要的资产定价理论，由诺贝尔经济学奖得主 Eugene Fama 和 Kenneth French 共同发展。Ben Felix 是将这套学术框架讲给普通投资者的最佳传播者。</p>

<h3>1. 市场因子（Market Beta）——风险溢价的基础</h3>
<div class="code-block"><span class="cm">// 为什么股票长期跑赢债券？</span>
<span class="hl">市场溢价</span>：历史约 5-7%/年（超额无风险利率）
原因：承担市场系统性风险的补偿
  
核心含义：
  • 持有市场（VOO/VTI）= 自动捕获市场溢价
  • 分散化是消除个股风险的免费午餐
  • 不能分散掉的系统性风险 = 回报来源

<span class="hl">Ben Felix的实践建议</span>：
  "仅持有市场因子（指数基金）对大多数投资者已足够。
   其他因子是锦上添花，不是必须的。"</div>

<h3>2. 规模因子（Size Premium）——小盘股溢价</h3>
<div class="code-block"><span class="cm">// 1981年 Banz 发现，后被 Fama-French 纳入模型</span>
<span class="hl">学术发现</span>：小市值公司（Small Cap）长期比大市值公司
  多赚约 2-3%/年（全球市场历史数据）

<span class="hl">直觉解释</span>：
  • 小公司分析师覆盖少 → 信息不对称 → 定价效率低
  • 流动性差 → 需要流动性溢价
  • 商业风险更高 → 需要更高回报补偿

<span class="hl">注意事项</span>（Ben Felix 强调）：
  • 单独的 Size 因子近年溢价不稳定
  • 需要与 Profitability 因子叠加才有效
  • 持仓：Avantis US Small Cap Value (AVUV) 是优质载体</div>

<h3>3. 价值因子（Value Premium）——便宜公司的超额回报</h3>
<div class="code-block"><span class="cm">// 最有争议、也最有长期证据的因子</span>
<span class="hl">定义</span>：低估值股票（低PB/PE）长期跑赢高估值股票
历史溢价：约 3-5%/年（全球130年数据）

<span class="hl">为什么有效？（两种解释）</span>：
  风险解释（Fama）：
    价值股通常是"陷入困境的公司"
    → 持有风险更高 → 理应有更高回报
  
  行为解释（Thaler等）：
    投资者对成长股过度乐观（买太贵）
    对价值股过度悲观（卖太便宜）
    → 均值回归产生超额回报

<span class="hl">2020年代状况</span>：
  • 2009-2021：成长股持续跑赢价值股（12年）
  • 2022：价值股反转，大幅跑赢（+20% vs 成长 -30%）
  • 2023-2024：成长股再次领先
  → Ben Felix 观点："因子溢价需要耐心，但长期仍成立"</div>

<h3>4. 盈利能力因子（Profitability Premium）</h3>
<div class="code-block"><span class="cm">// 高盈利公司长期跑赢低盈利公司</span>
<span class="hl">指标</span>：用"营业利润/账面资产"衡量

<span class="hl">组合运用</span>（Ben Felix 最推崇的配置）：
  Small Cap + Value + High Profitability

  • 风险调整后的夏普比率也更高

<script>
const STOCK_TOKEN_KEY = 'us_stock_token';
const STOCK_USER_KEY  = 'us_stock_user';
let _stockPendingIdx  = null;

// 后端 API 地址（同域部署时留空即可走相对路径）
const COURSE_AUTH_API = '/api/v1/course/auth';

function stockGetToken() { return localStorage.getItem(STOCK_TOKEN_KEY); }

function stockOpenModal() {
  const m = document.getElementById('stock-auth-modal');
  m.style.display = 'flex';
  document.getElementById('stock-auth-error').style.display = 'none';
  document.getElementById('stock-auth-username').value = '';
  document.getElementById('stock-auth-password').value = '';
  setTimeout(() => document.getElementById('stock-auth-username').focus(), 80);
}

// 页面加载时检查 require_login 参数，自动弹出登录框
(function() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('require_login') && !stockGetToken()) {
    window.addEventListener('DOMContentLoaded', function() {
      stockOpenModal();
    });
  }
})();

function stockCloseModal() {
  document.getElementById('stock-auth-modal').style.display = 'none';
  _stockPendingIdx = null;
}

async function stockSubmitLogin() {
  const username = document.getElementById('stock-auth-username').value.trim();
  const password = document.getElementById('stock-auth-password').value;
  const errBox   = document.getElementById('stock-auth-error');
  const btn      = document.getElementById('stock-auth-btn');
  const btnText  = document.getElementById('stock-auth-btn-text');

  if (!username || !password) {
    errBox.textContent = '请填写用户名和密码';
    errBox.style.display = 'block';
    return;
  }
  btn.disabled = true;
  btnText.textContent = '验证中…';
  errBox.style.display = 'none';

  try {
    const resp = await fetch(COURSE_AUTH_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username.toLowerCase(), password }),
    });

    if (!resp.ok) {
      const data = await resp.json().catch(() => ({}));
      errBox.textContent = data.detail || '用户名或密码错误';
      errBox.style.display = 'block';
      return;
    }

    const data = await resp.json();
    localStorage.setItem(STOCK_TOKEN_KEY, data.token);
    localStorage.setItem(STOCK_USER_KEY, JSON.stringify({
      username,
      display_name: data.display_name || username,
    }));
    stockCloseModal();

    const urlParams = new URLSearchParams(window.location.search);
    const redirectTo = urlParams.get('require_login');
    if (redirectTo) { window.location.href = redirectTo; return; }

    if (_stockPendingIdx !== null) {
      const idx = _stockPendingIdx;
      _stockPendingIdx = null;
      _origGoTo(idx);
    }
  } catch (e) {
    errBox.textContent = '网络错误，请稍后重试';
    errBox.style.display = 'block';
  } finally {
    btn.disabled = false;
    btnText.textContent = '登录';
  }
}
</script>
