version: '3.9'
services:
  backend:
    build: .
    ports: ["8001:8001"]
    env_file: .env
    depends_on: [db, redis]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    volumes: [.:/code]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tg_club
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes: [club_pgdata:/var/lib/postgresql/data]
    ports: ["5433:5432"]

  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]

volumes:
  club_pgdata:
