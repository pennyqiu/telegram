version: '3.9'
services:
  app:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [db, redis]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes: [.:/code]

  worker:
    build: .
    env_file: .env
    depends_on: [db, redis]
    command: celery -A app.tasks.celery_app worker -l info -Q default

  beat:
    build: .
    env_file: .env
    depends_on: [redis]
    command: celery -A app.tasks.celery_app beat -l info

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tg_sub
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes: [sub_pgdata:/var/lib/postgresql/data]
    ports: ["5432:5432"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  sub_pgdata:
